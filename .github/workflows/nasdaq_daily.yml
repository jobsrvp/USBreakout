name: Daily NASDAQ Breadth & RS

on:
  schedule:
    # Runs everyday at 12:00 UTC (7:00 AM EST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Lets you trigger it manually from the Actions UI

jobs:
  run-nasdaq-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run NASDAQ Data Pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Generating Relative Strength data..."
        python generate_nasdaq_rs.py
        
        echo "Calculating Market Breadth..."
        python market_breadth_nasdaq.py
        
        echo "Plotting and broadcasting charts..."
        python breadth_plotter_nasdaq.py
